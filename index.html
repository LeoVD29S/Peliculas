<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Bienvenidos al cine!</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="contenedor">
    <h1>¡Bienvenidos al cine-Leo!</h1>
    <h2>--- Menú ---</h2>

    <p class="instrucciones">
      Ingresa tu edad y te daremos la pelicula mas adecuada para tu edad de acuerdo al genero que selecciones.
    </p>

    <div class="campo-edad">
      <label for="edad">Edad:</label>
      <input type="number" id="edad" name="edad" value="20" min="1" max="120">
    </div>

    <div class="generos" role="group" aria-label="Selecciona un género">
      <button type="button" class="btn-genero" data-genero="Drama">Drama</button>
      <button type="button" class="btn-genero" data-genero="Comedy">Comedia</button>
      <button type="button" class="btn-genero" data-genero="Musical">Musical</button>
      <button type="button" class="btn-genero activo" data-genero="Crime">Crimen</button>
    </div>

    <section class="recomendacion">
      <p class="recomendacion-titulo">Nuestra recomendación:</p>
      <p class="pelicula" id="pelicula">The Godfather</p>
      <p class="cargando" id="cargando" hidden>Cargando...</p>
      <p class="error" id="error" hidden></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
